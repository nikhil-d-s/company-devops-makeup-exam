apiVersion: apps/v1
kind: Deployment
metadata:
  name: company-devops-platform
  labels:
    app: company-devops-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: company-devops-platform
  template:
    metadata:
      labels:
        app: company-devops-platform
    spec:
      containers:
        - name: platform
          image: ghcr.io/your-org/company-devops-platform:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
